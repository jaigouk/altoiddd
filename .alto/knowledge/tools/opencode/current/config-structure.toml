# OpenCode Configuration Structure
# Describes the .opencode/ directory layout and config precedence.

[_meta]
last_verified = "2026-02-22"
verified_against = "latest"
changelog_url = "https://github.com/sst/opencode/blob/dev/CHANGELOG.md"
source_urls = ["https://opencode.ai/docs/config"]
confidence = "medium"
deprecated = false
deprecated_since = ""
superseded_by = ""
next_review_date = "2026-05-22"
schema_version = 1

[project_structure]
# All paths relative to project root under .opencode/
"agents/*.md" = "Custom agent definitions. Markdown files with YAML frontmatter. Each file defines one subagent."
"modes/*.md" = "Custom mode definitions. Markdown files with YAML frontmatter. Each file defines one editing mode."
"commands/" = "Custom slash commands."
"rules/*.md" = "Project rules. Markdown files auto-loaded as additional instructions."
"plugins/" = "Plugin loading directory."
"skills/" = "Skills directory for reusable capabilities."
"tools/" = "Custom tool definitions."
"themes/" = "Visual theme customization for the TUI."

[project_root_files]
"opencode.json" = "Main project configuration file. JSON format with full schema support."
"opencode.jsonc" = "Alternative main config. JSONC format (JSON with comments) accepted as well."
"AGENTS.md" = "Project-level instructions file. Auto-loaded by OpenCode on every session."
"CLAUDE.md" = "Fallback instructions file. Used if no AGENTS.md is present. Provides backward compatibility with Claude Code."

[config_precedence]
description = "Configuration is merged across 6 layers. Later layers override earlier ones on conflict."
order = [
    "1. Remote config (.well-known/opencode) -- organizational defaults fetched from a remote URL",
    "2. Global config (~/.config/opencode/opencode.json) -- user-level defaults across all projects",
    "3. Custom config (OPENCODE_CONFIG env var) -- path to an alternate config file",
    "4. Project config (opencode.json in project root) -- project-level settings committed to VCS",
    "5. .opencode directories -- agents, modes, rules, tools loaded from .opencode/",
    "6. Inline config (OPENCODE_CONFIG_CONTENT env var) -- JSON string injected at runtime, highest precedence",
]

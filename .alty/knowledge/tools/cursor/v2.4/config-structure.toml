# Cursor Configuration Structure (v2.4)
# Describes the .cursor/ directory layout and config precedence.
# NOTE: Pre-AGENTS.md support. No cross-tool agent standard.

[_meta]
last_verified = "2026-02-22"
verified_against = "v2.4.x"
changelog_url = "https://www.cursor.com/changelog"
source_urls = ["https://docs.cursor.com/context/rules"]
confidence = "high"
deprecated = false
deprecated_since = ""
superseded_by = ""
next_review_date = "2026-05-22"
schema_version = 1

[project_structure]
# All paths relative to project root under .cursor/
"rules/*.mdc" = "Rule files in MDC format. YAML frontmatter + markdown body. Primary mechanism for project-level instructions."
".cursorrules" = "Legacy rule file. Plain text, no frontmatter. Deprecated in favor of .cursor/rules/*.mdc."

[config_precedence]
description = "Rules are merged in order from highest to lowest precedence. Higher precedence wins on conflict."
order = [
    "1. Team Rules — managed via Cursor cloud dashboard, synced to team members",
    "2. Project Rules (.cursor/rules/*.mdc) — committed to version control, file-level or glob-scoped",
    "3. .cursorrules (project root) — legacy fallback, plain text, deprecated",
    "4. User Rules (global) — stored in SQLite database, not file-based",
]

[notes]
global_config = "Global user rules are stored in a SQLite database (state.vscdb), not in a plain config file. alty cannot generate global config for Cursor."
team_rules = "Team Rules are managed through the Cursor cloud dashboard and synced automatically. Not stored in the project directory."
no_settings_json = "Unlike Claude Code, Cursor does not use a settings.json for AI-specific configuration. IDE settings follow VS Code conventions."

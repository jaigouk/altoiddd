# Claude Code .gitignore Patterns (v2.0)
# Defines which Claude Code files should be gitignored vs committed.
# NOTE: Pre-subagent era. No agent-memory-local/, rules/, or skills/.

[_meta]
last_verified = "2026-02-22"
verified_against = "v2.0.x"
changelog_url = "https://github.com/anthropics/claude-code/blob/main/CHANGELOG.md"
source_urls = ["https://docs.anthropic.com/en/docs/claude-code/overview"]
confidence = "high"
deprecated = false
deprecated_since = ""
superseded_by = ""
next_review_date = "2026-05-22"
schema_version = 1

[patterns]
description = "Files and directories that MUST be gitignored. These contain personal preferences or sensitive data."
entries = [
    ".claude/settings.local.json",
    ".claude/CLAUDE.local.md",
]

[committed]
description = "Files and directories that SHOULD be committed to version control. These are shared team configuration."
entries = [
    ".claude/CLAUDE.md",
    ".claude/settings.json",
    ".claude/commands/",
    ".claude/.mcp.json",
]

[example]
description = "Gitignore snippet for Claude Code files"
content = """
# Claude Code - personal/local files (do not commit)
.claude/settings.local.json
.claude/CLAUDE.local.md
"""

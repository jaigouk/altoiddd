[example]
content = """
# AGENTS.md

## Project Overview
This project uses DDD + TDD + SOLID principles.

## Architecture
- Domain layer: src/domain/ (no external dependencies)
- Application layer: src/application/ (ports and use cases)
- Infrastructure layer: src/infrastructure/ (adapters)

## Conventions
- TDD: Write failing test first, then implement
- SOLID: Single responsibility, depend on abstractions
- Python 3.12+ with type annotations
"""

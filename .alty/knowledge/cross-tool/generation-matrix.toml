notes = "No agent/persona generation — personas encoded as rule files"

[roo_code]
project_instructions = "AGENTS.md"
modes = ".roomodes"
mode_rules = ".roo/rules-{mode-slug}/"
shared_rules = ".roo/rules/"
gitignore_entries = []

[opencode]
project_instructions = "AGENTS.md"
agents = ".opencode/agents/{persona}.md"

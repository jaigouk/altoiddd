gitignore_entries = [
    ".claude/settings.local.json",
    ".claude/CLAUDE.local.md",
    ".claude/agent-memory-local/",
]

[cursor]
project_instructions = "AGENTS.md"
rules = ".cursor/rules/{topic}.mdc"

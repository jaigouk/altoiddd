# Claude Code Agent/Subagent Definition Format
# Describes how to define custom agents using markdown files with YAML frontmatter.

[_meta]
last_verified = "2026-03-04"
verified_against = "v2.1"
confidence = "high"
deprecated = false
deprecated_since = ""
superseded_by = ""
next_review_date = "2026-06-04"
schema_version = 1

[format]
file_extension = ".md"
uses_frontmatter = true
frontmatter_format = "yaml"
location_project = ".claude/agents/"
location_global = "~/.claude/agents/"
description = "Each .md file defines one subagent. Filename (without extension) becomes the agent name."

[required_fields]
name = { type = "string", pattern = "^[a-z0-9-]+$", description = "Agent identifier. Lowercase alphanumeric with hyphens." }
description = { type = "string", description = "Short description shown when listing agents." }

[optional_fields]
tools = { type = "list[string]", description = "Allowlist of tools this agent can use." }
disallowedTools = { type = "list[string]", description = "Denylist of tools. Takes precedence over allowlist." }
model = { type = "enum", values = ["sonnet", "opus", "haiku", "inherit"], default = "inherit" }
maxTurns = { type = "integer", description = "Maximum tool-use turns before agent stops." }
memory = { type = "enum", values = ["user", "project", "local"], default = "project" }
isolation = { type = "enum", values = ["worktree"], description = "Runs in separate git worktree." }

[body]
description = "Markdown content after YAML frontmatter becomes the agent's system prompt."
format = "markdown"

[example]
content = """
---
name: researcher
description: Investigates libraries and technical questions
model: inherit
tools:
  - Read
  - Glob
  - Grep
  - Bash
disallowedTools:
  - Edit
  - Write
maxTurns: 50
---

You are a **Researcher** agent. Read-only investigation and structured reports.
"""

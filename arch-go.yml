version: 1

threshold:
  compliance: 100
  coverage: 60  # Only bounded contexts have rules; shared/composition/mcp are not BCs

dependenciesRules:
  # Bootstrap domain layer isolation
  - package: "github.com/alty-cli/alty/internal/bootstrap/domain"
    shouldOnlyDependsOn:
      internal:
        - "github.com/alty-cli/alty/internal/bootstrap/domain"
        - "github.com/alty-cli/alty/internal/shared/domain"
      external:
        - "$gostd"
    shouldNotDependsOn:
      internal:
        - "github.com/alty-cli/alty/internal/bootstrap/application"
        - "github.com/alty-cli/alty/internal/bootstrap/infrastructure"

  # Bootstrap application layer

# CI workflow for alty (Go)
name: CI

on:
  push:
    branches: [main, golang]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.26"
  GOLANGCI_LINT_VERSION: "v2.1.6"
  TRIVY_VERSION: "0.58.0"
  NO_COLOR: "1"

jobs:
  test:
    name: Build & Test
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: https://github.com/actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        timeout-minutes: 10
        run: go test ./... -race -count=1 -timeout=120s

  lint:
    name: Lint
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: https://github.com/actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install golangci-lint
        run: |
          mkdir -p $HOME/.local/bin
          export PATH="$HOME/.local/bin:$PATH"
          INSTALLED=""
          if command -v golangci-lint &> /dev/null; then
            INSTALLED=$(golangci-lint version --short 2>/dev/null || echo "")
          fi
          WANT="${{ env.GOLANGCI_LINT_VERSION }}"
          WANT_NUM="${WANT#v}"
          if [ "$INSTALLED" != "$WANT_NUM" ]; then
            echo "Installing golangci-lint ${WANT} (current: ${INSTALLED:-none})"
            curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b $HOME/.local/bin ${WANT}
          else
            echo "golangci-lint ${WANT} already installed"
          fi
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          golangci-lint version

      - name: Run golangci-lint
        run: golangci-lint run

  security:
    name: Security Scan (Trivy)
    needs: test
    runs-on: self-hosted
    steps:
      - name: Check available RAM
        run: |
          AVAIL_MB=$(awk '/MemAvailable/ {printf "%d", $2/1024}' /proc/meminfo)
          echo "Available RAM: ${AVAIL_MB} MB"
          if [ "$AVAIL_MB" -lt 1024 ]; then
            echo "::warning::Skipping security scan — only ${AVAIL_MB} MB RAM available (need 1024 MB)"
            echo "SKIP_SECURITY=true" >> $GITHUB_ENV
          fi

      - name: Checkout
        if: env.SKIP_SECURITY != 'true'
        uses: actions/checkout@v4

      - name: Install Trivy
        if: env.SKIP_SECURITY != 'true'
        run: |
          mkdir -p $HOME/.local/bin
          export PATH="$HOME/.local/bin:$PATH"
          if ! command -v trivy &> /dev/null || [ "$(trivy --version 2>/dev/null | grep -oP '\d+\.\d+\.\d+' | head -1)" != "${{ env.TRIVY_VERSION }}" ]; then
            echo "Installing Trivy ${{ env.TRIVY_VERSION }}..."
            curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b $HOME/.local/bin v${{ env.TRIVY_VERSION }}
          fi
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          trivy --version

      - name: Scan for vulnerabilities
        if: env.SKIP_SECURITY != 'true'
        run: |
          trivy fs . \
            --scanners vuln \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 1 \
            --format table

      - name: Scan for secrets
        if: env.SKIP_SECURITY != 'true'
        run: |
          trivy fs . \
            --scanners secret \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --format table

      - name: Scan for misconfigurations
        if: env.SKIP_SECURITY != 'true'
        run: |
          trivy config . \
            --severity CRITICAL,HIGH \
            --skip-policy-update \
            --exit-code 0 \
            --format table
        continue-on-error: true

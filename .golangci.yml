version: "2"

linters:
  default: standard
  enable:
    # Error handling
    - errorlint
    - wrapcheck

    # Code quality
    - revive
    - gocritic
    - exhaustive
    - misspell

    # Context propagation
    - noctx
    - contextcheck

    # Resource management
    - bodyclose

    # Testing
    - testifylint

    # Note: DDD layer enforcement moved to arch-go (MIT license)
    # See arch-go.yml for dependency rules

  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment

    revive:
      rules:
        - name: exported
          arguments: [checkPrivateReceivers]
        - name: var-naming
        - name: indent-error-flow
        - name: error-return
        - name: unexported-return

  exclusions:
    rules:
      - path: '_test\.go'
        linters:
          - errcheck
          - gocritic
          - wrapcheck

formatters:
  enable:
    - gofumpt
    - gci

  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/alto-cli/alto)

output:
  formats:
    text:
      path: stdout
      print-linter-name: true

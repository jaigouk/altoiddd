name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          EXT: ${{ matrix.ext }}
        run: |
          VERSION_PKG=github.com/jaigouk/altoiddd/internal/composition
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-s -w -X ${VERSION_PKG}.Version=${VERSION}"
          BINARY=alto-${GOOS}-${GOARCH}${EXT}
          go build -ldflags "${LDFLAGS}" -o "${BINARY}" ./cmd/alto

      - uses: actions/upload-artifact@v4
        with:
          name: alto-${{ matrix.goos }}-${{ matrix.goarch }}
          path: alto-*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
